version: '3.8'

services:
  db:
    image: postgres:16
    container_name: prayertools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prayertools_user
      POSTGRES_PASSWORD: CHANGE_ME_PASSWORD
      POSTGRES_DB: prayertools
    ports:
      - "5433:5432"
    volumes:
      - prayertools_pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: base-mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    environment:
      MH_STORAGE: memory
    restart: unless-stopped
    networks:
      - base-network

networks:
  base-network:
    driver: bridge

volumes:
  prayertools_pgdata:
